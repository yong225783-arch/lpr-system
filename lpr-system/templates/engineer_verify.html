<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程商驗證 - 車牌辨識系統</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
        }
        .verify-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .verify-box h2 {
            margin-bottom: 10px;
            color: #333;
        }
        .verify-box p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .error-msg {
            color: #dc3545;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
        .back-link {
            margin-top: 20px;
            font-size: 14px;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="verify-box">
        <h2>🔐 工程商驗證</h2>
        <p>請輸入工程商密碼以進入設定頁面</p>
        
        <form id="verifyForm">
            <div class="form-group">
                <label>工程商密碼</label>
                <input type="password" id="engineerPwd" placeholder="請輸入密碼" required>
            </div>
            <button type="submit" class="btn-primary">驗證</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>
        
        <div class="back-link">
            <a href="{{ url_for('index') }}">← 返回首頁</a>
        </div>
    </div>

    <script>
        document.getElementById('verifyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pwd = document.getElementById('engineerPwd').value;
            const errorMsg = document.getElementById('errorMsg');
            
            fetch('/api/engineer/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pwd })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '{{ url_for("settings") }}';
                } else {
                    errorMsg.textContent = data.error || '密碼錯誤';
                    errorMsg.style.display = 'block';
                    document.getElementById('engineerPwd').value = '';
                }
            })
            .catch(() => {
                errorMsg.textContent = '驗證失敗，請稍後再試';
                errorMsg.style.display = 'block';
            });
        });
    </script>
</body>
</html>
